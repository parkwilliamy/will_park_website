<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Subtle ASIC/PCB circuit-trace motif. Two color families (blue + violet)
       so the background ties into the site palette. -->
  <g fill="none" stroke-width="1" stroke-linecap="square">
    <!-- horizontal traces -->
    <path d="M0 50 H70 L80 60 V100" stroke="rgba(99,165,250,0.10)"/>
    <path d="M120 0 V40 L140 60 H200" stroke="rgba(99,165,250,0.10)"/>
    <path d="M0 160 H50 L60 170 H120 L130 160 H200" stroke="rgba(99,165,250,0.10)"/>
    <!-- vertical / L-shape traces in violet -->
    <path d="M40 0 V30 L60 50 V90" stroke="rgba(167,139,250,0.10)"/>
    <path d="M170 100 V140 L150 160 V200" stroke="rgba(167,139,250,0.10)"/>
    <path d="M100 110 H140 L160 130" stroke="rgba(167,139,250,0.10)"/>
    <!-- chip block outlines -->
    <rect x="80" y="100" width="40" height="40" stroke="rgba(56,189,248,0.16)" rx="2"/>
    <rect x="20" y="100" width="20" height="20" stroke="rgba(167,139,250,0.14)" rx="1"/>
  </g>
  <!-- via / pad dots -->
  <g fill="rgba(56,189,248,0.22)">
    <circle cx="70" cy="50"  r="1.6"/>
    <circle cx="80" cy="60"  r="1.6"/>
    <circle cx="140" cy="60" r="1.6"/>
    <circle cx="60" cy="50"  r="1.6"/>
    <circle cx="170" cy="100" r="1.6"/>
    <circle cx="160" cy="130" r="1.6"/>
    <circle cx="60" cy="170" r="1.6"/>
    <circle cx="130" cy="160" r="1.6"/>
  </g>
  <g fill="rgba(167,139,250,0.22)">
    <circle cx="40" cy="30" r="1.4"/>
    <circle cx="100" cy="110" r="1.4"/>
    <circle cx="140" cy="110" r="1.4"/>
    <circle cx="100" cy="140" r="1.4"/>
    <circle cx="140" cy="140" r="1.4"/>
    <circle cx="120" cy="40" r="1.4"/>
  </g>
</svg>
